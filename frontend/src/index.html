<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заңгерлік көмекші</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <button type="button" class="btn-new-chat" aria-label="Жаңа сөйлесім">
                <span class="btn-icon"></span>
                <span>Жаңа сөйлесім</span>
            </button>
            <nav class="chat-list" id="chat-list" aria-label="Сөйлесімдер тізімі"></nav>
        </aside>
        <main class="main">
            <div id="messages" class="messages"></div>
            <div class="input-wrapper">
                <div class="input-area">
                    <textarea id="user-input" rows="1" placeholder="Хабарлама жазыңыз..." autocomplete="off"></textarea>
                    <button type="button" id="send-btn" class="send-btn" aria-label="Жіберу">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    </button>
                </div>
                <p class="disclaimer">AI қателесуі мүмкін. Ресми құжаттарды тексеріңіз.</p>
            </div>
        </main>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
