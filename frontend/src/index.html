<!DOCTYPE html>
<html class="light" lang="kk">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lex AI - Заңгерлік көмекші</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f8f9fb",
                        "on-secondary-fixed-variant": "#394951",
                        "surface-container-high": "#e7e8ea",
                        "primary-fixed-dim": "#a7c8ff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#d1e2ec",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed": "#d4e5ef",
                        "inverse-on-surface": "#f0f1f3",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#b8c9d3",
                        "primary-container": "#003366",
                        "surface-tint": "#3a5f94",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#799dd6",
                        "surface-container-low": "#f3f4f6",
                        "on-tertiary-fixed-variant": "#5d4201",
                        "primary": "#001e40",
                        "on-primary-fixed": "#001b3c",
                        "primary-fixed": "#d5e3ff",
                        "inverse-primary": "#a7c8ff",
                        "outline": "#737780",
                        "surface-dim": "#d9dadc",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#43474f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#261900",
                        "background": "#f8f9fb",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdea5",
                        "tertiary-fixed-dim": "#e9c176",
                        "surface-container": "#edeef0",
                        "on-secondary-container": "#55656d",
                        "secondary": "#506169",
                        "on-secondary-fixed": "#0d1e25",
                        "surface-variant": "#e1e2e4",
                        "surface-container-highest": "#e1e2e4",
                        "on-surface": "#191c1e",
                        "surface": "#f8f9fb",
                        "outline-variant": "#c3c6d1",
                        "on-tertiary-container": "#bb9650",
                        "on-error": "#ffffff",
                        "tertiary": "#2a1c00",
                        "tertiary-container": "#453000",
                        "on-background": "#191c1e"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <link rel="stylesheet" href="style.css"/>
</head>
<body class="flex min-h-screen font-body bg-background text-on-surface">
    <!-- Sidebar -->
    <aside class="sidebar h-screen w-64 left-0 sticky bg-slate-100 flex flex-col p-4 space-y-2 shrink-0">
        <div class="mb-8 px-2">
            <h1 class="text-xl font-headline font-bold text-blue-950">Lex AI</h1>
            <p class="text-xs text-slate-500 font-medium">Заңгерлік көмекші</p>
        </div>
        <button type="button" class="btn-new-chat bg-primary text-on-primary flex items-center justify-center gap-2 py-3 px-4 rounded-lg shadow-sm transition-all ease-in-out duration-200 hover:opacity-90 mb-6">
            <span class="material-symbols-outlined">add</span>
            <span class="text-sm font-medium">Жаңа чат</span>
        </button>
        <nav id="chat-list" class="chat-list flex-1 space-y-1 overflow-y-auto" aria-label="Сөйлесімдер тізімі"></nav>
        <div class="pt-4 border-t border-slate-200/50 space-y-1">
            <a class="text-slate-600 hover:bg-slate-200 flex items-center gap-3 px-3 py-2 rounded-lg transition-all duration-200" href="#">
                <span class="material-symbols-outlined">help</span>
                <span class="text-sm">Көмек</span>
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-surface relative">
        <!-- Top Bar -->
        <header class="w-full top-0 sticky bg-slate-50 border-b border-slate-200/50 shadow-sm flex justify-between items-center px-6 py-3 z-10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-headline font-bold tracking-tight text-blue-900">Lex AI</span>
                <div class="h-6 w-px bg-slate-200 mx-2"></div>
                <h2 id="chat-title" class="text-sm font-medium text-slate-600">Жаңа сөйлесім</h2>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter hidden sm:block">LEX CORE V2.0</span>
            </div>
        </header>

        <!-- Messages -->
        <section id="messages" class="messages flex-1 overflow-y-auto p-6 space-y-8 scroll-smooth">
            <div class="max-w-4xl mx-auto w-full space-y-6 pb-32"></div>
        </section>

        <!-- Input -->
        <footer class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-surface via-surface/90 to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="relative group">
                    <div class="absolute inset-0 bg-primary opacity-[0.02] rounded-2xl pointer-events-none"></div>
                    <div class="bg-surface-container-lowest shadow-[0px_8px_24px_rgba(0,30,64,0.08)] rounded-2xl flex flex-col p-2 transition-all duration-300 focus-within:shadow-[0px_12px_32px_rgba(0,30,64,0.12)] border border-transparent focus-within:border-outline-variant/30">
                        <textarea id="user-input" class="w-full bg-transparent border-none focus:ring-0 text-on-surface text-lg px-4 py-3 resize-none min-h-[60px] max-h-[200px]" placeholder="Сұрағыңызды осында жазыңыз..." rows="1"></textarea>
                        <div class="flex items-center justify-between px-2 pb-1">
                            <div class="flex items-center gap-1"></div>
                            <div class="flex items-center gap-3">
                                <button type="button" id="send-btn" class="bg-primary text-on-primary p-2.5 rounded-xl flex items-center justify-center transition-all hover:scale-105 active:scale-95 shadow-md" aria-label="Жіберу">
                                    <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 700;">arrow_upward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="text-[10px] text-center text-slate-400 mt-3 px-4">Бұл жасанды интеллект кеңесі. Ресми заңды шешім қабылдамас бұрын мамандандырылған заңгермен кеңесуді ұсынамыз.</p>
            </div>
        </footer>

        <!-- Watermark -->
        <div class="absolute top-20 right-10 pointer-events-none opacity-[0.03] select-none">
            <svg class="text-primary" fill="currentColor" height="400" viewBox="0 0 100 100" width="400">
                <path d="M50 5 C30 5 15 20 15 40 C15 60 30 75 50 75 C70 75 85 60 85 40 C85 20 70 5 50 5 M50 15 C65 15 75 25 75 40 C75 55 65 65 50 65 C35 65 25 55 25 40 C25 25 35 15 50 15"></path>
                <path d="M50 80 L50 95 M40 85 L60 85"></path>
            </svg>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
